name: CI

on: [push, pull_request]

jobs:
  test:
    name: ${{ matrix.toolchain }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        toolchain: ["1.95.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          profile: minimal
          toolchain: ${{ matrix.toolchain }}

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.toolchain }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-features --locked -- --nocapture --test-threads=1

      - name: Release build
        run: cargo build --workspace --release --locked

      - name: Prepare systemd verification environment
        if: matrix.os == 'ubuntu-latest' && matrix.toolchain == '1.95.0'
        run: |
          sudo install -D -m 0755 target/release/ola-core /usr/local/bin/ola-core
          if ! getent group ola >/dev/null; then
            sudo groupadd --system ola
          fi
          if ! id -u ola >/dev/null 2>&1; then
            sudo useradd --system --gid ola --no-create-home --shell /usr/sbin/nologin ola
          fi
          sudo install -d -m 0755 /etc/ola /var/log/ola /run/ola

      - name: Verify systemd units
        if: matrix.os == 'ubuntu-latest' && matrix.toolchain == '1.95.0'
        run: systemd-analyze verify dist/systemd/ola.service dist/systemd/ola.socket

      - name: Upload release artifact
        if: matrix.os == 'ubuntu-latest' && matrix.toolchain == '1.95.0'
        uses: actions/upload-artifact@v4
        with:
          name: ola-core
          path: target/release/ola-core
