name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          profile: minimal
          toolchain: 1.95.0

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked --force

      - name: Run security audit
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.18.9 --force

      - name: Run dependency policy audit
        run: cargo deny --manifest-path Cargo.toml --all-features --locked check --config deny.toml
